<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>マジカルストリート</title>
<style>
  :root{
    --sky-top:#8ED1FC;
    --sky-bottom:#DFF6FF;
    --road:#6E7180;
    --road-line:#FFFFFF;
    --building1:#FFB5A7;
    --building2:#A8E6CF;
    --building3:#D4C1EC;
    --sun:#FFD93D;
    --pink:#FF8FAB;
    --cream:#FFF8F0;
    --text-dark:#4A4458;
    --purple-deep:#7C5CBF;
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic Medium","Meiryo",sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; height:100%; background:#EFEAFE; overscroll-behavior:none;}
  #app{
    max-width:480px; margin:0 auto; height:100vh; height:100dvh;
    background:var(--cream);
    box-shadow:0 0 40px rgba(124,92,191,0.25);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .screen{display:none; flex-direction:column; height:100%; width:100%; position:relative;}
  .screen.active{display:flex;}

  .snd-fab{
    position:absolute; top:12px; right:12px; width:38px; height:38px; border-radius:50%;
    border:none; background:#fff; box-shadow:0 3px 8px rgba(0,0,0,0.18); font-size:17px; cursor:pointer; z-index:50;
  }
  .snd-fab:active{transform:scale(0.92);}
  .hud-sound{
    border:none; background:rgba(255,255,255,0.22); color:#fff; border-radius:8px;
    padding:3px 7px; font-size:15px; cursor:pointer;
  }

  /* ---------- shared bits ---------- */
  .btn{
    border:none; border-radius:999px; padding:16px 28px; font-size:18px; font-weight:700;
    color:#fff; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,0.15); transition:transform .08s, box-shadow .08s;
    font-family:inherit;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.15);}
  .btn-primary{background:linear-gradient(180deg,#FF9EB5,var(--pink));}
  .btn-secondary{background:linear-gradient(180deg,#A6E3E9,#6FCBD6); color:#22424A;}
  .btn-ghost{background:linear-gradient(180deg,#E3D6FF,#C7AEFA); color:var(--purple-deep);}

  .title-text{
    font-size:34px; font-weight:900; text-align:center; color:#fff;
    -webkit-text-stroke:3px var(--purple-deep);
    paint-order:stroke fill;
    letter-spacing:1px;
  }

  /* ---------- START SCREEN ---------- */
  #screen-start{
    background:linear-gradient(180deg,#FFD6E8 0%, #FFE9C7 50%, #D8F3DC 100%);
    align-items:center; justify-content:center; gap:26px; padding:24px; text-align:center;
  }
  .start-emojis{font-size:40px; display:flex; gap:14px;}
  .start-emojis span{display:inline-block; animation:bob 1.6s ease-in-out infinite;}
  .start-emojis span:nth-child(2){animation-delay:.2s;}
  .start-emojis span:nth-child(3){animation-delay:.4s;}
  .start-emojis span:nth-child(4){animation-delay:.6s;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .tagline{color:var(--text-dark); font-size:15px; line-height:1.7; max-width:300px;}
  .start-buttons{display:flex; flex-direction:column; gap:14px; width:240px;}

  /* ---------- GAME SCREEN ---------- */
  #screen-game{height:100%;}
  .hud{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px; background:var(--purple-deep); color:#fff; font-weight:700; font-size:16px;
    z-index:20; position:relative;
  }
  .hud-right{display:flex; gap:14px;}
  #gameArea{
    position:relative; flex:1; overflow:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bottom) 70%);
  }
  .sun{
    position:absolute; top:18px; right:24px; width:46px; height:46px; border-radius:50%;
    background:var(--sun); box-shadow:0 0 24px rgba(255,217,61,0.8);
  }
  .buildings{
    position:absolute; left:0; right:0; bottom:84px; height:90px;
    background-image:
      linear-gradient(var(--building1),var(--building1)),
      linear-gradient(var(--building2),var(--building2)),
      linear-gradient(var(--building3),var(--building3));
    background-repeat:repeat-x;
    background-size:90px 60px, 70px 90px, 110px 45px;
    background-position:0 30px, 60px 0px, 150px 45px;
    opacity:.9;
    animation:scrollBg 6s linear infinite;
  }
  @keyframes scrollBg{from{background-position-x:0,60px,150px;} to{background-position-x:-220px,-160px,-70px;}}
  .road{
    position:absolute; left:0; right:0; bottom:0; height:84px; background:var(--road);
  }
  .road::before{
    content:""; position:absolute; top:38px; left:0; right:0; height:6px;
    background-image:repeating-linear-gradient(90deg, var(--road-line) 0 26px, transparent 26px 52px);
    animation:lineMove .5s linear infinite;
  }
  @keyframes lineMove{from{background-position-x:0;}to{background-position-x:-52px;}}

  #player{
    position:absolute; left:56px; bottom:78px; width:36px; height:60px;
    transform-origin:bottom center; z-index:10;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  #player::after{
    content:""; position:absolute; bottom:-4px; left:50%; margin-left:-12px;
    width:24px; height:5px; background:rgba(0,0,0,0.18); border-radius:50%;
  }
  #player canvas{
    display:block; image-rendering:pixelated; image-rendering:crisp-edges;
  }
  #player.flash canvas{animation:flashHit .4s ease-in-out 2;}
  @keyframes flashHit{0%,100%{filter:none;} 50%{filter:brightness(1.9) drop-shadow(0 0 6px #E63950);}}

  @keyframes jumpArc{
    0%{transform:translateY(0);}
    35%{transform:translateY(-78px);}
    62%{transform:translateY(-78px);}
    100%{transform:translateY(0);}
  }
  #player.jump{animation:jumpArc .55s ease-out;}

  .item{
    position:absolute; font-size:32px; line-height:1; z-index:8;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,.2));
  }
  .item-animal{cursor:pointer; padding:6px;}

  .float-text{
    position:absolute; font-weight:900; font-size:18px; z-index:30; pointer-events:none;
    animation:floatUp 1s ease-out forwards;
  }
  @keyframes floatUp{from{transform:translateY(0); opacity:1;} to{transform:translateY(-46px); opacity:0;}}

  .hint{
    text-align:center; font-size:12px; color:var(--text-dark); background:#fff;
    padding:8px; border-top:2px solid #eee;
  }

  /* ---------- GAME OVER ---------- */
  #screen-gameover{
    background:linear-gradient(180deg,#FFE3EC,#E8DBFF);
    align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center;
  }
  .go-emoji{font-size:54px;}
  .result-card{
    background:#fff; border-radius:20px; padding:18px 28px; box-shadow:0 6px 18px rgba(124,92,191,0.2);
    font-size:18px; color:var(--text-dark); font-weight:700; line-height:2;
  }

  /* ---------- KINGDOM SCREEN ---------- */
  #screen-kingdom{background:linear-gradient(180deg,#D8F3DC,#C7EFE0);}
  .kingdom-header{
    text-align:center; font-size:22px; font-weight:900; color:var(--purple-deep);
    padding:16px 0 8px;
  }
  .kingdom-scroll{flex:1; overflow-y:auto; padding:8px 14px 14px;}
  .kingdom-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .animal-card{
    border-radius:18px; padding:12px 8px 10px; text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.12); transition:background .3s;
  }
  .animal-emoji{font-size:40px;}
  .happiness{font-size:13px; margin:4px 0 8px;}
  .card-actions{display:flex; justify-content:center; gap:6px;}
  .mini-btn{
    border:none; border-radius:10px; padding:6px 8px; font-size:15px; background:#fff;
    box-shadow:0 2px 0 rgba(0,0,0,0.12); cursor:pointer;
  }
  .mini-btn:active{transform:translateY(2px); box-shadow:none;}
  .empty-msg{
    text-align:center; color:var(--text-dark); font-size:14px; line-height:1.8; padding:40px 24px;
  }
  .kingdom-footer{padding:14px; display:flex; justify-content:center;}
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="screen-start" class="screen active">
    <button class="sound-btn snd-fab">🔊</button>
    <div class="title-text">🌟マジカルストリート🌟</div>
    <div class="start-emojis"><span>🧒</span><span>🐶</span><span>🐱</span><span>⭐</span></div>
    <div class="tagline">街をはしって、コインや星をあつめよう。<br>動物にタッチして、どうぶつの国にまねこう!</div>
    <div class="start-buttons">
      <button class="btn btn-primary" id="btnPlay">▶ あそぶ</button>
      <button class="btn btn-ghost" id="btnKingdomFromStart">🐾 どうぶつの国を見る</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="hud">
      <div id="hearts">❤️❤️❤️</div>
      <div class="hud-right">
        <span id="scoreDisplay">🪙 0</span>
        <span id="animalDisplay">🐾 0</span>
        <button class="sound-btn hud-sound">🔊</button>
      </div>
    </div>
    <div id="gameArea">
      <div class="sun"></div>
      <div class="buildings"></div>
      <div class="road"></div>
      <div id="player">
        <canvas id="playerCanvas" width="36" height="60"></canvas>
      </div>
    </div>
    <div class="hint">画面タップでジャンプ・動物はタッチで助けよう♪</div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen">
    <button class="sound-btn snd-fab">🔊</button>
    <div class="go-emoji">🎉</div>
    <div class="title-text" style="font-size:26px;">ゲームおわり!</div>
    <div class="result-card" id="resultCard"></div>
    <div class="start-buttons">
      <button class="btn btn-primary" id="btnRetry">🔁 もういちどあそぶ</button>
      <button class="btn btn-secondary" id="btnKingdomFromOver">🐾 どうぶつの国を見る</button>
    </div>
  </div>

  <!-- KINGDOM -->
  <div id="screen-kingdom" class="screen">
    <button class="sound-btn snd-fab">🔊</button>
    <div class="kingdom-header">🐾 どうぶつの国 🐾</div>
    <div class="kingdom-scroll">
      <div id="kingdomGrid" class="kingdom-grid"></div>
      <div id="kingdomEmpty" class="empty-msg" style="display:none;">まだ動物がいないよ。<br>ゲームでわんちゃん・ねこちゃんを助けてね!</div>
    </div>
    <div class="kingdom-footer">
      <button class="btn btn-primary" id="btnBackToStart">ゲームにもどる</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- constants ----------
  var PLAYER_X = 60;
  var ITEM_WIDTH = 40;
  var ZONE_LEFT = PLAYER_X - 14;
  var ZONE_RIGHT = PLAYER_X + 56;
  var HOUSE_COLORS = ["#FFE3D1","#D9F2E6","#E3D9FB","#FFE0EE","#DCEFFB","#FFF3C7"];

  // ---------- pixel art character (18×30, SNES-style sailor uniform girl) ----------
  var PAL = {
    '.':null,
    'K':'#0D0D1A','N':'#1E2D55','n':'#2E4580','b':'#4A70B0',
    'S':'#FFD5B0','s':'#EFB080','E':'#FFFFFF','e':'#0D0D1A',
    'c':'#FFB8C8','R':'#CC2233','r':'#991122',
    'W':'#F4F4F8','w':'#C8C8D4',
    'J':'#6878A0','j':'#485878',
    'G':'#8090B0','g':'#5060A0',
    'O':'#E8E8E0','o':'#A8A898'
  };
  var SPR_W=18, SPR_H=30, SCALE=2;
  var FRAMES=[
    [ // Frame 0 – left leg forward
     '...KNNNnnNNK......',
     '..KNNNnbbnNNNK....',
     '.KNNNnbbbbnnNNK...',
     'KNNNnbSSSSsbNNKK..',
     'KNNNbSSEeSSbNNK...',
     'KNNnSSSSScsnNK....',
     '.KNnSSSSSSssK.....',
     '..KnSSSSSssK......',
     '...KSSSSssK.......',
     '..KWWWRrWWwwK.....',
     '.KWWWrrWWWJJjK....',
     'KJJWWWwWWJJJjK....',
     'KJJJWwWWJJJjjK....',
     'KJJJJJJJJJjjK.....',
     '.KJJJJJJJJjK......',
     '.KGGGGGGGGgK......',
     '.KGGGGGGGGgK......',
     '.KGGGGGGGGgK......',
     '..KGGGGGGGgK......',
     '..KGGGGGGgK.......',
     '..KGg....gGK......',
     '.KGGg...gGGK......',
     'KGGg.....gGK......',
     'KGg......gGK......',
     'KOo......oOK......',
     'Koo......ooK......',
     '..................',
     '..................',
     '..................',
     '..................',
    ],
    [ // Frame 1 – right leg forward
     '...KNNNnnNNK......',
     '..KNNNnbbnNNNK....',
     '.KNNNnbbbbnnNNK...',
     'KNNNnbSSSSsbNNKK..',
     'KNNNbSSEeSSbNNK...',
     'KNNnSSSSScsnNK....',
     '.KNnSSSSSSssK.....',
     '..KnSSSSSssK......',
     '...KSSSSssK.......',
     '..KWWWRrWWwwK.....',
     '.KWWWrrWWWJJjK....',
     'KJJWWWwWWJJJjK....',
     'KJJJWwWWJJJjjK....',
     'KJJJJJJJJJjjK.....',
     '.KJJJJJJJJjK......',
     '.KGGGGGGGGgK......',
     '.KGGGGGGGGgK......',
     '.KGGGGGGGGgK......',
     '..KGGGGGGGgK......',
     '..KGGGGGGgK.......',
     '..KGg....gGK......',
     '.KGGg...gGGK......',
     '.KGGg....gGGK.....',
     '.KGg.....gGK......',
     '.KOo.....oOK......',
     '.Koo.....ooK......',
     '..................',
     '..................',
     '..................',
     '..................',
    ],
  ];

  var pCanvas, pCtx, pFrame=0, pTimer=null;

  function initCanvas(){
    pCanvas = document.getElementById('playerCanvas');
    pCtx = pCanvas.getContext('2d');
    pCtx.imageSmoothingEnabled = false;
    drawFrame(0);
  }

  function drawFrame(fi){
    if(!pCtx) return;
    var rows = FRAMES[fi % FRAMES.length];
    pCtx.clearRect(0, 0, SPR_W*SCALE, SPR_H*SCALE);
    for(var r=0; r<rows.length; r++){
      var row = rows[r];
      for(var c=0; c<SPR_W; c++){
        var color = PAL[row[c]||'.'];
        if(!color) continue;
        pCtx.fillStyle = color;
        pCtx.fillRect(c*SCALE, r*SCALE, SCALE, SCALE);
      }
    }
  }

  function startFrameAnim(){
    clearInterval(pTimer);
    pFrame=0; drawFrame(0);
    pTimer = setInterval(function(){
      pFrame=(pFrame+1)%FRAMES.length;
      drawFrame(pFrame);
    }, 130);
  }
  function stopFrameAnim(){
    clearInterval(pTimer);
    drawFrame(0);
  }

  // ---------- audio engine (synthesized, no external files) ----------
  var audioCtx = null;
  var bgmTimer = null;
  var bgmActive = false;
  var bgmIndex = 0;
  var BGM_NOTES = [
    {f:523.25,d:0.22},{f:659.25,d:0.22},{f:783.99,d:0.22},{f:659.25,d:0.22},
    {f:587.33,d:0.22},{f:698.46,d:0.22},{f:880.00,d:0.22},{f:698.46,d:0.22}
  ];

  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume(); }
  }

  function tone(freq, startOffset, dur, type, vol){
    if(!audioCtx || !state.musicOn) return;
    var t0 = audioCtx.currentTime + startOffset;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol || 0.18, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }

  function seJump(){
    if(!audioCtx || !state.musicOn) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(320, t);
    osc.frequency.exponentialRampToValueAtTime(640, t + 0.12);
    gain.gain.setValueAtTime(0.14, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.15);
  }
  function seCoin(){ tone(880,0,0.09,'square',0.12); tone(1318.5,0.07,0.12,'square',0.12); }
  function seRescue(){ tone(523.25,0,0.12,'triangle',0.18); tone(659.25,0.09,0.12,'triangle',0.18); tone(783.99,0.18,0.2,'triangle',0.18); }
  function seHit(){
    if(!audioCtx || !state.musicOn) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(90, t + 0.25);
    gain.gain.setValueAtTime(0.16, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.3);
  }
  function seGameOver(){ tone(659.25,0,0.18,'triangle',0.15); tone(523.25,0.18,0.18,'triangle',0.15); tone(440,0.36,0.18,'triangle',0.15); tone(349.23,0.54,0.35,'triangle',0.15); }
  function seTap(){ tone(700,0,0.05,'sine',0.07); }

  function playBgmStep(){
    if(!bgmActive || !state.musicOn || !audioCtx) return;
    var note = BGM_NOTES[bgmIndex % BGM_NOTES.length];
    tone(note.f, 0, note.d*0.9, 'triangle', 0.05);
    bgmIndex++;
    bgmTimer = setTimeout(playBgmStep, note.d*1000);
  }
  function startBgm(){
    ensureAudio();
    if(bgmActive || !audioCtx) return;
    bgmActive = true; bgmIndex = 0;
    playBgmStep();
  }
  function stopBgm(){ bgmActive = false; clearTimeout(bgmTimer); }

  function toggleSound(){
    ensureAudio();
    state.musicOn = !state.musicOn;
    document.querySelectorAll('.sound-btn').forEach(function(b){ b.textContent = state.musicOn ? '🔊' : '🔇'; });
    if(state.musicOn){ startBgm(); } else { stopBgm(); }
  }

  document.body.addEventListener('click', function initAudioOnce(){
    ensureAudio();
    if(state.musicOn) startBgm();
    document.body.removeEventListener('click', initAudioOnce);
  }, {once:true});

  document.querySelectorAll('.sound-btn').forEach(function(b){
    b.addEventListener('click', function(e){ e.stopPropagation(); toggleSound(); });
  });

  // ---------- state ----------
  var state = {
    running:false,
    score:0,
    hearts:3,
    isJumping:false,
    isInvincible:false,
    items:[],
    nextItemId:1,
    nextAnimalId:1,
    rescued:[],     // {id, kind, emoji, happiness, houseIdx}
    spawnTimer:null,
    rafId:null,
    speed:3.0,
    musicOn:true
  };

  // ---------- elements ----------
  var screens = {
    start: document.getElementById('screen-start'),
    game: document.getElementById('screen-game'),
    gameover: document.getElementById('screen-gameover'),
    kingdom: document.getElementById('screen-kingdom')
  };
  var gameArea = document.getElementById('gameArea');
  var playerEl = document.getElementById('player');
  var heartsEl = document.getElementById('hearts');
  var scoreEl = document.getElementById('scoreDisplay');
  var animalEl = document.getElementById('animalDisplay');
  var resultCard = document.getElementById('resultCard');
  var kingdomGrid = document.getElementById('kingdomGrid');
  var kingdomEmpty = document.getElementById('kingdomEmpty');

  function showScreen(name){
    Object.keys(screens).forEach(function(k){
      screens[k].classList.toggle('active', k===name);
    });
  }

  // ---------- HUD ----------
  function updateHUD(){
    heartsEl.textContent = "❤️".repeat(Math.max(state.hearts,0)) + "🤍".repeat(Math.max(3-state.hearts,0));
    scoreEl.textContent = "🪙 " + state.score;
    animalEl.textContent = "🐾 " + state.rescued.length;
  }

  // ---------- floating text ----------
  function floatText(xPx, bottomPx, text, color){
    var el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.left = xPx + 'px';
    el.style.bottom = bottomPx + 'px';
    el.style.color = color || '#7C5CBF';
    gameArea.appendChild(el);
    setTimeout(function(){ el.remove(); }, 1000);
  }

  // ---------- jump ----------
  function jump(){
    if(!state.running || state.isJumping) return;
    state.isJumping = true;
    seJump();
    playerEl.classList.add('jump');
    setTimeout(function(){
      state.isJumping = false;
      playerEl.classList.remove('jump');
    }, 550);
  }

  gameArea.addEventListener('click', function(e){
    if(e.target.closest('.item-animal')) return; // handled separately
    jump();
  });

  // ---------- spawning ----------
  function spawnItem(){
    if(!state.running) return;
    var isAnimal = Math.random() < 0.55;
    var el = document.createElement('div');
    var areaWidth = gameArea.clientWidth;
    var startX = areaWidth;
    var item = {
      id: state.nextItemId++,
      x: startX,
      status: 'active',
      type: isAnimal ? 'animal' : 'treasure',
      el: el
    };

    if(isAnimal){
      var kind = Math.random() < 0.5 ? 'dog' : 'cat';
      item.kind = kind;
      item.emoji = kind === 'dog' ? '🐶' : '🐱';
      el.className = 'item item-animal';
      el.style.bottom = '74px';
      el.addEventListener('click', function(ev){
        ev.stopPropagation();
        rescueAnimal(item);
      });
    } else {
      item.emoji = Math.random() < 0.5 ? '🪙' : '⭐';
      el.className = 'item item-treasure';
      el.style.bottom = '128px';
    }
    el.textContent = item.emoji;
    el.style.left = item.x + 'px';
    gameArea.appendChild(el);
    state.items.push(item);
  }

  function scheduleSpawn(){
    if(!state.running) return;
    var delay = 800 + Math.random()*700;
    state.spawnTimer = setTimeout(function(){
      spawnItem();
      scheduleSpawn();
    }, delay);
  }

  // ---------- rescue ----------
  function rescueAnimal(item){
    if(item.status !== 'active' || !state.running) return;
    item.status = 'rescued';
    var idx = state.items.indexOf(item);
    if(idx !== -1) state.items.splice(idx,1);
    seRescue();
    floatText(item.x, 110, '💖 たすけた!', '#FF6F91');
    item.el.remove();

    state.rescued.push({
      id: state.nextAnimalId++,
      kind: item.kind,
      emoji: item.emoji,
      happiness: 0,
      houseIdx: Math.floor(Math.random()*HOUSE_COLORS.length)
    });
    updateHUD();
  }

  // ---------- hit ----------
  function flashPlayer(){
    playerEl.classList.add('flash');
    setTimeout(function(){ playerEl.classList.remove('flash'); }, 800);
  }

  function registerHit(){
    if(state.isInvincible) return;
    state.hearts--;
    updateHUD();
    flashPlayer();
    seHit();
    floatText(PLAYER_X, 130, '💥', '#E63950');
    state.isInvincible = true;
    setTimeout(function(){ state.isInvincible = false; }, 900);
    if(state.hearts <= 0){
      gameOver();
    }
  }

  // ---------- main loop ----------
  function updateItems(){
    var remaining = [];
    for(var i=0;i<state.items.length;i++){
      var item = state.items[i];
      item.x -= state.speed;
      item.el.style.left = item.x + 'px';
      var remove = false;
      var inZone = item.x <= ZONE_RIGHT && item.x >= ZONE_LEFT;

      if(item.status === 'active'){
        if(item.type === 'treasure' && inZone){
          state.score++;
          updateHUD();
          seCoin();
          floatText(item.x, 128, '+1', '#FFB100');
          remove = true;
        } else if(item.type === 'animal'){
          if(inZone && state.isJumping){
            item.status = 'safe';
          } else if(item.x < ZONE_LEFT){
            registerHit();
            remove = true;
          }
        }
      }
      if(item.x < -ITEM_WIDTH){ remove = true; }

      if(remove){ item.el.remove(); } else { remaining.push(item); }
    }
    state.items = remaining;
  }

  function loop(){
    if(!state.running) return;
    state.speed = Math.min(3.0 + state.score*0.025, 5.5);
    updateItems();
    state.rafId = requestAnimationFrame(loop);
  }

  // ---------- game flow ----------
  function startGame(){
    state.running = true;
    state.score = 0;
    state.hearts = 3;
    state.isJumping = false;
    state.isInvincible = false;
    state.speed = 3.0;
    state.items.forEach(function(it){ it.el.remove(); });
    state.items = [];
    updateHUD();
    playerEl.classList.add('running');
    showScreen('game');
    startFrameAnim();
    scheduleSpawn();
    loop();
  }

  function gameOver(){
    state.running = false;
    playerEl.classList.remove('running');
    stopFrameAnim();
    clearTimeout(state.spawnTimer);
    cancelAnimationFrame(state.rafId);
    seGameOver();
    resultCard.innerHTML =
      '🪙 あつめたコイン: ' + state.score + '<br>' +
      '🐾 たすけた動物(るいけい): ' + state.rescued.length + 'ひき';
    setTimeout(function(){ showScreen('gameover'); }, 500);
  }

  function goToKingdom(){
    if(state.running){ state.running = false; playerEl.classList.remove('running'); stopFrameAnim(); clearTimeout(state.spawnTimer); cancelAnimationFrame(state.rafId); }
    seTap();
    renderKingdom();
    showScreen('kingdom');
  }

  function goToStart(){
    seTap();
    showScreen('start');
  }

  // ---------- kingdom rendering ----------
  function renderKingdom(){
    kingdomGrid.innerHTML = '';
    if(state.rescued.length === 0){
      kingdomEmpty.style.display = 'block';
      kingdomGrid.style.display = 'none';
      return;
    }
    kingdomEmpty.style.display = 'none';
    kingdomGrid.style.display = 'grid';

    state.rescued.forEach(function(animal){
      var card = document.createElement('div');
      card.className = 'animal-card';
      card.style.background = HOUSE_COLORS[animal.houseIdx];

      var hearts = '❤️'.repeat(animal.happiness) + '🤍'.repeat(5-animal.happiness);

      card.innerHTML =
        '<div class="animal-emoji">'+animal.emoji+'</div>' +
        '<div class="happiness">'+hearts+'</div>' +
        '<div class="card-actions">' +
          '<button class="mini-btn" data-act="pet">🖐️</button>' +
          '<button class="mini-btn" data-act="feed">🍖</button>' +
          '<button class="mini-btn" data-act="deco">🎨</button>' +
        '</div>';

      card.querySelectorAll('.mini-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          var act = btn.getAttribute('data-act');
          seTap();
          if(act === 'pet' || act === 'feed'){
            animal.happiness = Math.min(5, animal.happiness+1);
          } else if(act === 'deco'){
            animal.houseIdx = (animal.houseIdx+1) % HOUSE_COLORS.length;
          }
          renderKingdom();
        });
      });

      kingdomGrid.appendChild(card);
    });
  }

  // ---------- wire up buttons ----------
  document.getElementById('btnPlay').addEventListener('click', function(){ seTap(); startGame(); });
  document.getElementById('btnRetry').addEventListener('click', function(){ seTap(); startGame(); });
  document.getElementById('btnKingdomFromStart').addEventListener('click', goToKingdom);
  document.getElementById('btnKingdomFromOver').addEventListener('click', goToKingdom);
  document.getElementById('btnBackToStart').addEventListener('click', goToStart);

  updateHUD();
  initCanvas();
})();
</script>
</body>
</html>
